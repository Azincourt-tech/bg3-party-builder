<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BG3 Build Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <svg class="logo" viewBox="0 0 40 40" fill="none" aria-label="BG3 Build Tracker">
          <polygon points="20,3 37,12 37,28 20,37 3,28 3,12" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.4"/>
          <polygon points="20,8 32,15 32,25 20,32 8,25 8,15" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
          <circle cx="20" cy="20" r="4" fill="var(--accent)"/>
          <line x1="20" y1="12" x2="20" y2="16" stroke="var(--accent)" stroke-width="1.5"/>
          <line x1="20" y1="24" x2="20" y2="28" stroke="var(--accent)" stroke-width="1.5"/>
          <line x1="12" y1="20" x2="16" y2="20" stroke="var(--accent)" stroke-width="1.5"/>
          <line x1="24" y1="20" x2="28" y2="20" stroke="var(--accent)" stroke-width="1.5"/>
        </svg>
        <div>
          <h1 class="brand-title">BG3 Build Tracker</h1>
          <p class="brand-sub">Baldur's Gate 3 — Guia de Progressão</p>
        </div>
      </div>
      <div class="header-controls">
        <button class="btn-icon" id="resetBtn" title="Resetar todo o progresso" aria-label="Resetar progresso">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <button class="btn-icon" data-theme-toggle aria-label="Alternar tema">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Character Tabs -->
  <nav class="char-nav" id="charNav" role="tablist" aria-label="Personagens"></nav>

  <!-- Main Content -->
  <main id="mainContent" class="main-content"></main>

  <!-- Toast -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
