<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BG3 Build Tracker — Guia de Party Baldur's Gate 3</title>
  <meta name="description" content="Planeje e acompanhe o progresso da sua party em Baldur's Gate 3. Builds otimizadas para todos os personagens, do nível 1 ao 12.">
  <meta name="theme-color" content="#0e0d0b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <!-- Site Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <svg class="logo" viewBox="0 0 40 40" fill="none" aria-label="BG3 Build Tracker">
          <polygon points="20,3 37,12 37,28 20,37 3,28 3,12" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.4"/>
          <polygon points="20,8 32,15 32,25 20,32 8,25 8,15" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
          <circle cx="20" cy="20" r="4" fill="var(--accent)"/>
          <line x1="20" y1="12" x2="20" y2="16" stroke="var(--accent)" stroke-width="1.5"/>
          <line x1="20" y1="24" x2="20" y2="28" stroke="var(--accent)" stroke-width="1.5"/>
          <line x1="12" y1="20" x2="16" y2="20" stroke="var(--accent)" stroke-width="1.5"/>
          <line x1="24" y1="20" x2="28" y2="20" stroke="var(--accent)" stroke-width="1.5"/>
        </svg>
        <div>
          <h1 class="brand-title">BG3 Party Builder</h1>
          <p class="brand-sub">Baldur's Gate 3 — Tracker de Progressão</p>
        </div>
      </div>
      <div class="header-controls">
        <button class="btn-icon" id="resetBtn" title="Resetar progresso" aria-label="Resetar progresso">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <button class="btn-icon" data-theme-toggle aria-label="Alternar tema">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Party Picker Bar -->
  <div class="party-bar" id="partyBar">
    <div class="party-bar-inner">
      <!-- Slot Tav (fixo) -->
      <div class="party-slot fixed" id="slotTav">
        <div class="slot-avatar" id="slotTavAvatar"></div>
        <div class="slot-info">
          <span class="slot-name" id="slotTavName">Tav</span>
          <span class="slot-role" id="slotTavRole">Seu personagem</span>
        </div>
        <span class="slot-badge fixed-badge">PRINCIPAL</span>
      </div>

      <div class="party-divider">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>

      <!-- Slots 1, 2, 3 selecionáveis -->
      <div class="party-slot selectable" id="slot1" data-slot="0">
        <div class="slot-avatar" id="slot1Avatar"></div>
        <div class="slot-info">
          <span class="slot-name" id="slot1Name">—</span>
          <span class="slot-role" id="slot1Role">Clique para escolher</span>
        </div>
      </div>
      <div class="party-slot selectable" id="slot2" data-slot="1">
        <div class="slot-avatar" id="slot2Avatar"></div>
        <div class="slot-info">
          <span class="slot-name" id="slot2Name">—</span>
          <span class="slot-role" id="slot2Role">Clique para escolher</span>
        </div>
      </div>
      <div class="party-slot selectable" id="slot3" data-slot="2">
        <div class="slot-avatar" id="slot3Avatar"></div>
        <div class="slot-info">
          <span class="slot-name" id="slot3Name">—</span>
          <span class="slot-role" id="slot3Role">Clique para escolher</span>
        </div>
      </div>

      <!-- Progresso geral da party -->
      <div class="party-progress">
        <div class="party-progress-label">Party</div>
        <div class="party-progress-bar-wrap">
          <div class="party-progress-bar">
            <div class="party-progress-fill" id="partyProgressFill"></div>
          </div>
          <span class="party-progress-pct" id="partyProgressPct">0%</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Picker Modal -->
  <div class="picker-overlay" id="pickerOverlay" hidden>
    <div class="picker-modal" role="dialog" aria-modal="true" aria-label="Selecionar companheiro">
      <div class="picker-header">
        <h2 class="picker-title">Escolher Companheiro</h2>
        <button class="btn-icon" id="pickerClose" aria-label="Fechar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="picker-grid" id="pickerGrid"></div>
    </div>
  </div>

  <!-- Main: 4 colunas de party -->
  <main class="main-content" id="mainContent"></main>

  <!-- Toast -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
